name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        # libasound2-dev lets RtAudio configure its ALSA backend on the runner.
        # The tests themselves use the offline backend and never open a device.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libasound2-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
